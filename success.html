<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підтвердження оплати</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f1e1cd; color: #4b5982; text-align: center; padding: 20px; }
        .box { background: rgba(255,255,255,0.3); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4b5982; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box" id="status-box">
        <h2>Перевіряємо оплату...</h2>
        <div class="loader"></div>
        <p>Це займе до 30 секунд. Будь ласка, не закривайте сторінку.</p>
    </div>

    <script>
        const BUG_TELEGRAM_TOKEN = '8450851710:AAGsC5O72ab-C8ZWw2guCc7bGMX0rRbhhZI';
        const BUG_CHAT_ID = '6190541661';
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby217-_kq3_-kWqrljDOT3ZPp33pyQ2hIyL-oK72ZX6HH7V5GVyU06DAGymE_8xdg5q/exec";

        async function verify() {
            const txId = localStorage.getItem('my_payment_id');
            const rawData = localStorage.getItem('pending_registration');

            if (!txId || !rawData) {
                document.getElementById('status-box').innerHTML = "<h2>❌ Помилка: Дані не знайдено</h2>";
                return;
            }

            try {
                const response = await fetch(`${SCRIPT_URL}?id=${txId}`);
                const status = await response.text();

                if (status === "SUCCESS") {
                    const userData = JSON.parse(rawData);
                    const message = `✅ ОПЛАЧЕНО!\n🆔 ${txId}\n👤 ${userData.firstName} ${userData.lastName}\n🏫 Клас: ${userData.studentClass}\n⚽ Спорт: ${userData.sportType}\n💬 ${userData.comments}`;

                    await fetch(`https://api.telegram.org/bot${BUG_TELEGRAM_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: BUG_CHAT_ID, text: message })
                    });

                    document.getElementById('status-box').innerHTML = "<h2 style='color:green;'>✅ Готово!</h2><p>Вашу оплату підтверджено, заявку надіслано в учнівське самоврядування.</p><a href='index.html' style='color:inherit; font-weight:bold;'>На головну</a>";
                    
                    localStorage.clear(); // Очищуємо все
                } else {
                    setTimeout(verify, 7000); // Пробуємо кожні 7 секунд
                }
            } catch (e) {
                console.log("Очікування...");
                setTimeout(verify, 5000);
            }
        }

        window.onload = verify;
    </script>
</body>
</html>
