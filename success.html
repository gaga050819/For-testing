<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Підтвердження оплати</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f1e1cd; color: #4b5982; text-align: center; padding: 20px; margin: 0; }
        .box { background: rgba(255,255,255,0.3); padding: 40px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.5); max-width: 400px; width: 100%; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4b5982; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-home { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #4b5982; color: white; text-decoration: none; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box" id="status-box">
        <div id="content">
            <h2>Перевіряємо оплату...</h2>
            <div class="loader"></div>
            <p id="timer-text">Ми шукаємо ваш внесок у системі Monobank. Це може зайняти трохи часу.</p>
        </div>
    </div>

    <script>
        const BUG_TELEGRAM_TOKEN = '8450851710:AAGsC5O72ab-C8ZWw2guCc7bGMX0rRbhhZI';
        const BUG_CHAT_ID = '6190541661';
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby217-_kq3_-kWqrljDOT3ZPp33pyQ2hIyL-oK72ZX6HH7V5GVyU06DAGymE_8xdg5q/exec";

        let attempts = 0;
        const maxAttempts = 20; 

        async function verify() {
            const txId = localStorage.getItem('my_payment_id');
            const rawData = localStorage.getItem('pending_registration');

            if (!txId || !rawData) {
                document.getElementById('status-box').innerHTML = "<h2>❌ Помилка</h2><p>Дані реєстрації не знайдені. Спробуйте заповнити анкету знову.</p>";
                return;
            }

            attempts++;

            try {
                const response = await fetch(`${SCRIPT_URL}?checkId=${txId}`);
                const status = await response.text();

                if (status.includes("SUCCESS")) {
                    const userData = JSON.parse(rawData);
                    const message = `✅ НОВА РЕЄСТРАЦІЯ (ОПЛАЧЕНО)!\n🆔 ID: ${txId}\n👤 Учень: ${userData.firstName} ${userData.lastName}\n🏫 Клас: ${userData.studentClass}\n🏆 Спорт: ${userData.sportType}\n💬 Коментар: ${userData.comments}`;

                    await fetch(`https://api.telegram.org/bot${BUG_TELEGRAM_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: BUG_CHAT_ID, text: message })
                    });

                    document.getElementById('status-box').innerHTML = `
                        <h2 style='color:green;'>✅ Оплату знайдено!</h2>
                        <p>Вас успішно зареєстровано на змагання.</p>
                        <a href='index.html' class='btn-home'>На головну</a>
                    `;
                    
                    localStorage.removeItem('my_payment_id');
                    localStorage.removeItem('pending_registration');
                } else {
                    if (attempts < maxAttempts) {
                        document.getElementById('timer-text').innerText = `Шукаємо оплату (спроба ${attempts})... Поповніть банку з коментарем ${txId}`;
                        setTimeout(verify, 10000); 
                    } else {
                        document.getElementById('status-box').innerHTML = `
                            <h2>⏳ Час очікування вийшов</h2>
                            <p>Ми поки не бачимо вашої оплати з коментарем <b>${txId}</b>.</p>
                            <p>Якщо ви вже оплатили, не хвилюйтеся — ми обробимо заявку вручну пізніше.</p>
                            <a href='index.html' class='btn-home'>Повернутись на сайт</a>
                        `;
                    }
                }
            } catch (e) {
                console.error("Помилка зв'язку зі скриптом");
                setTimeout(verify, 10000);
            }
        }

        window.onload = verify;
    </script>
</body>
</html>
