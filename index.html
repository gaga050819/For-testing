<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNL Vote — Live Результати</title>
    <style>
        :root {
            --glass: rgba(30, 30, 35, 0.6);
            --blur: blur(25px);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --accent: #0A84FF; /* Apple Blue Dark Mode */
        }

        /* Фіксуємо екран і робимо крутий плавний фон */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100vh;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            /* Новий надійний анімований фон */
            background: linear-gradient(-45deg, #1a0b2e, #4b134f, #13294b, #001528);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Головна картка: тепер має мінімальну висоту, щоб не стискатися */
        .main-container {
            background: var(--glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: var(--border);
            border-radius: 25px;
            width: 95%;
            max-width: 500px;
            min-height: 380px; /* Не дає їй зменшуватись */
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box;
        }

        h1 { font-size: 1.3rem; margin: 0 0 10px 0; font-weight: 700; text-align: center; }

        /* Авторизація */
        #auth-section { display: flex; flex-direction: column; justify-content: center; flex-grow: 1; width: 100%; }
        
        .btn-google {
            background: #fff; color: #000; border: none; padding: 14px 20px;
            border-radius: 15px; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;
        }
        .btn-google:hover { transform: scale(1.02); }

        /* Блок голосування */
        #vote-section { display: none; flex-direction: column; width: 100%; height: 100%; }
        #user-info { font-size: 0.8rem; opacity: 0.6; margin: 0 0 15px 0; text-align: center; }

        /* Сітка з фото (3 в ряд) */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; width: 100%; margin-bottom: 15px;
        }

        .event-tile {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 10px;
            text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        .event-tile:hover { background: rgba(255, 255, 255, 0.1); }
        .event-tile.selected { border-color: var(--accent); background: rgba(10, 132, 255, 0.2); box-shadow: 0 0 15px rgba(10, 132, 255, 0.4); }
        .event-tile.disabled { opacity: 0.7; cursor: default; } /* Стан після голосування */

        .event-tile img {
            width: 100%; aspect-ratio: 1/1; object-fit: cover;
            border-radius: 10px; margin-bottom: 8px;
        }

        .event-tile h3 { font-size: 0.75rem; margin: 0 0 5px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Лічильник голосів (Живий) */
        .live-count {
            background: rgba(255,255,255,0.15); padding: 4px 8px;
            border-radius: 10px; font-size: 0.8rem; font-weight: bold; width: 80%;
        }

        /* Кнопка та статус */
        #submit-vote-btn {
            width: 100%; padding: 15px; background: var(--accent); color: white;
            border: none; border-radius: 15px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: auto;
        }
        #submit-vote-btn:disabled { background: rgba(255,255,255,0.1); color: #888; cursor: not-allowed; }
        #status-msg { font-size: 1rem; font-weight: 600; text-align: center; margin-top: 15px; display: none; color: #32d74b; }

    </style>
</head>
<body>

    <div class="main-container">
        <h1>📊 Live Голосування DNL</h1>

        <div id="auth-section">
            <button class="btn-google" id="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" width="20">
                Увійти для голосування
            </button>
        </div>

        <div id="vote-section">
            <p id="user-info"></p>

            <div class="events-grid" id="events-grid">
                <div class="event-tile" onclick="selectEvent('Кіноніч', this)">
                    <img src="https://via.placeholder.com/150" alt="Кіно">
                    <h3>Кіноніч у ліцеї</h3>
                    <div class="live-count" id="count-kino">0 👤</div>
                </div>

                <div class="event-tile" onclick="selectEvent('Турнір FIFA', this)">
                    <img src="https://via.placeholder.com/150" alt="FIFA">
                    <h3>Турнір з FIFA 24</h3>
                    <div class="live-count" id="count-fifa">0 👤</div>
                </div>

                <div class="event-tile" onclick="selectEvent('Ярмарок', this)">
                    <img src="https://via.placeholder.com/150" alt="Ярмарок">
                    <h3>Благодійний ярмарок</h3>
                    <div class="live-count" id="count-yarmarok">0 👤</div>
                </div>
            </div>

            <button id="submit-vote-btn" onclick="finalSubmitVote()" disabled>Оберіть подію вище</button>
            <p id="status-msg">✅ Твій голос враховано!</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // ДОДАНО onValue для живого підрахунку!
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyRjdbRjQonfqNX-hY1XSdM2og2xeyngs",
            authDomain: "golosovanna.firebaseapp.com",
            databaseURL: "https://golosovanna-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "golosovanna",
            storageBucket: "golosovanna.firebasestorage.app",
            messagingSenderId: "869952269827",
            appId: "1:869952269827:web:c15cf5553e2e43a2062836"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();
        const provider = new GoogleAuthProvider();

        const authSection = document.getElementById('auth-section');
        const voteSection = document.getElementById('vote-section');
        const userInfoText = document.getElementById('user-info');
        const submitBtn = document.getElementById('submit-vote-btn');
        const statusMsg = document.getElementById('status-msg');

        let selectedCandidate = null;
        let hasVoted = false; // Блокувальник, якщо вже проголосував

        // --- ЛОГІКА ЖИВОГО ПІДРАХУНКУ (REAL-TIME) ---
        const votesRef = ref(db, 'votes');
        onValue(votesRef, (snapshot) => {
            // Рахуємо голоси з усієї бази
            let counts = { 'Кіноніч': 0, 'Турнір FIFA': 0, 'Ярмарок': 0 };
            
            snapshot.forEach((child) => {
                let voteData = child.val();
                if (voteData.candidateId && counts[voteData.candidateId] !== undefined) {
                    counts[voteData.candidateId]++;
                }
            });

            // Оновлюємо цифри на екрані
            document.getElementById('count-kino').innerText = counts['Кіноніч'] + ' 👤';
            document.getElementById('count-fifa').innerText = counts['Турнір FIFA'] + ' 👤';
            document.getElementById('count-yarmarok').innerText = counts['Ярмарок'] + ' 👤';
        });
        // ---------------------------------------------

        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authSection.style.display = 'none';
                voteSection.style.display = 'flex';
                userInfoText.innerText = "Увійшов як: " + user.email;
                
                // Перевіряємо, чи вже голосував
                const snapshot = await get(ref(db, 'votes/' + user.uid));
                if (snapshot.exists()) {
                    showAlreadyVotedState();
                }
            } else {
                authSection.style.display = 'flex';
                voteSection.style.display = 'none';
            }
        });

        window.selectEvent = (name, element) => {
            if (hasVoted) return; // Якщо вже голосував, кліки не працюють

            document.querySelectorAll('.event-tile').forEach(tile => tile.classList.remove('selected'));
            element.classList.add('selected');
            
            selectedCandidate = name;
            submitBtn.disabled = false;
            submitBtn.innerText = `Голосувати за: ${name}`;
            submitBtn.style.background = "#0A84FF";
            submitBtn.style.color = "#fff";
        };

        window.finalSubmitVote = async () => {
            const user = auth.currentUser;
            if (!user || !selectedCandidate) return;

            submitBtn.innerText = "Відправка...";
            submitBtn.disabled = true;

            try {
                await set(ref(db, 'votes/' + user.uid), {
                    candidateId: selectedCandidate,
                    timestamp: Date.now()
                });
                showAlreadyVotedState();
            } catch (e) {
                alert("Помилка запису. Можливо, ви вже голосували.");
                submitBtn.innerText = "Оберіть подію вище";
            }
        };

        function showAlreadyVotedState() {
            hasVoted = true;
            // Робимо плитки напівпрозорими, але НЕ ховаємо їх! (Щоб бачити лічильники)
            document.querySelectorAll('.event-tile').forEach(tile => tile.classList.add('disabled'));
            submitBtn.style.display = 'none'; // Ховаємо кнопку
            statusMsg.style.display = 'block'; // Показуємо галочку
        }
    </script>
</body>
</html>
