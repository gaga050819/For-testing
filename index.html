<!DOCTYPE html>
<html lang="uk">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3060369291416814" crossorigin="anonymous"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f1e1cd" id="theme-color-meta">
<title>Форма реєстрації | Учнівське самоврядування</title>
<style>
:root {
    --bg: #f1e1cd;
    --text: #4b5982;
    --card-bg: rgba(255,255,255,0.3);
    --card-border: rgba(255,255,255,0.5);
    --tr: all 0.4s cubic-bezier(0.25,0.8,0.25,1);
}
*,*::before,*::after { box-sizing: border-box; }
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, var(--bg), #e5d2b8, var(--bg));
    color: var(--text);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh;
    transition: background 0.8s ease, color 0.5s ease;
    overflow-x: hidden;
}
body.dark {
    --bg: #4b5982;
    --text: #f1e1cd;
    --card-bg: rgba(241,225,205,0.1);
    --card-border: rgba(241,225,205,0.2);
    background: linear-gradient(180deg,#4b5982,#353f5c,#4b5982) !important;
}
.controls {
    position: fixed; top: 20px; left: 20px;
    z-index: 1000; display: flex; flex-direction: column; gap: 15px;
}
#themeBtn, #menuBtn {
    padding: 12px; border-radius: 50px;
    border: 1px solid var(--card-border);
    background: var(--card-bg); backdrop-filter: blur(15px);
    color: inherit; cursor: pointer; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    transition: var(--tr);
    display: flex; justify-content: center; align-items: center;
}
#menuBtn { width: 50px; height: 50px; font-size: 22px; }
@media (hover:hover) {
    #themeBtn:hover, #menuBtn:hover { transform: scale(1.1); background: rgba(255,255,255,0.5); }
}
.sidebar {
    position: fixed; top: 0; left: -100%;
    width: 100%; max-width: 300px;
    height: 100vh; height: -webkit-fill-available;
    background: var(--card-bg); backdrop-filter: blur(40px);
    border-right: 1px solid var(--card-border);
    z-index: 1001; transition: var(--tr);
    display: flex; flex-direction: column;
    padding: 100px 30px 0;
    box-shadow: 15px 0 50px rgba(0,0,0,0.2);
    opacity: 0; visibility: hidden;
}
.sidebar.open { left: 0; opacity: 1; visibility: visible; }
.sidebar-links { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.sidebar a {
    text-decoration: none; padding: 18px 25px; margin-bottom: 20px;
    border-radius: 25px; background: rgba(255,255,255,0.1);
    border: 1px solid var(--card-border);
    color: inherit; font-weight: 700; font-size: 1.2rem; transition: var(--tr);
}
@media (hover:hover) {
    .sidebar a:hover { transform: translateX(10px); background: rgba(255,255,255,0.3); }
}
#closeBtn {
    position: absolute; top: 30px; right: 30px;
    background: none; border: none; font-size: 28px; color: inherit; cursor: pointer;
}
#versionBox {
    padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
    font-size: 13px; opacity: 0.6; flex-shrink: 0; color: var(--text);
}
.page-hero {
    width: 90%; max-width: 600px;
    margin-top: 100px;
    border-radius: 30px; overflow: hidden;
    border: 1px solid var(--card-border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.page-hero img { width: 100%; display: block; }
header {
    width: 90%; max-width: 1200px; margin: 30px 0 10px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
}
.main-title {
    grid-column: 2;
    font-size: clamp(1.6rem,6vw,3rem);
    font-weight: 900; text-align: center; margin: 0;
}
.logo {
    justify-self: end;
    width: clamp(50px,10vw,80px); height: clamp(50px,10vw,80px);
    border-radius: 50%; border: 3px solid currentColor;
    display: flex; justify-content: center; align-items: center;
    font-weight: bold; overflow: hidden;
}
.container { width: 95%; max-width: 680px; padding-bottom: 60px; }
.login-card {
    background: var(--card-bg); backdrop-filter: blur(25px);
    border: 1px solid var(--card-border);
    border-radius: 40px; padding: 40px 30px;
    text-align: center; margin-bottom: 30px;
}
.login-card h2 { margin: 0 0 10px; font-size: 1.6rem; }
.login-card p { margin: 0 0 25px; opacity: 0.7; font-size: 0.95rem; }
.google-btn {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 28px; border-radius: 50px;
    border: 1.5px solid var(--card-border);
    background: var(--card-bg); backdrop-filter: blur(10px);
    color: var(--text); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: var(--tr);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}
.google-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.5); }
.google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
.user-info {
    display: flex; align-items: center; gap: 12px;
    background: var(--card-bg); backdrop-filter: blur(15px);
    border: 1px solid var(--card-border);
    border-radius: 50px; padding: 10px 20px 10px 10px;
    margin-bottom: 25px;
}
.user-info img { width: 40px; height: 40px; border-radius: 50%; }
.user-info span { font-weight: 600; font-size: 0.95rem; flex: 1; }
.logout-btn {
    background: none; border: 1px solid var(--card-border);
    border-radius: 20px; padding: 6px 14px;
    color: var(--text); font-size: 0.8rem; cursor: pointer; transition: var(--tr);
}
.logout-btn:hover { background: rgba(255,0,0,0.1); border-color: rgba(255,0,0,0.3); color: #e11d48; }
.form-card {
    background: var(--card-bg); backdrop-filter: blur(25px);
    border: 1px solid var(--card-border);
    border-radius: 40px; padding: 30px;
}
.form-row { display: flex; gap: 12px; }
.form-field { flex: 1; margin-bottom: 14px; }
.form-field label { display: block; font-size: 0.8rem; font-weight: 700; opacity: 0.6; margin-bottom: 6px; padding-left: 4px; }
.form-field input, .form-field textarea {
    width: 100%;
    background: rgba(255,255,255,0.2); border: 1.5px solid var(--card-border);
    border-radius: 18px; padding: 14px 16px;
    color: var(--text); font-size: 0.95rem; font-family: inherit;
    outline: none; transition: border-color 0.2s;
}
body.dark .form-field input, body.dark .form-field textarea {
    background: rgba(241,225,205,0.08);
}
.form-field input:focus, .form-field textarea:focus { border-color: var(--text); }
.form-field textarea { resize: none; min-height: 100px; }
.form-field input::placeholder, .form-field textarea::placeholder { opacity: 0.5; }
.action-btn {
    width: 100%; padding: 16px; border: none; border-radius: 25px;
    background: var(--text); color: var(--bg);
    font-size: 1rem; font-weight: 800; cursor: pointer;
    transition: var(--tr); box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}
.action-btn:hover { transform: translateY(-2px); opacity: 0.9; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.success-msg {
    display: none; text-align: center; padding: 20px;
    font-size: 1rem; font-weight: 700; color: #16a34a;
}
body.dark .success-msg { color: #4ade80; }
footer { width: 100%; padding: 40px 20px; text-align: center; margin-top: auto; }
.social-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 25px; margin-bottom: 35px; }
.social-links a { text-decoration: none; color: inherit; font-weight: 700; font-size: 1rem; letter-spacing: 1px; transition: var(--tr); }
.social-links a:hover { opacity: 0.7; }
@media (max-width: 768px) {
    .controls { flex-direction: row; width: calc(100% - 40px); justify-content: space-between; top: 15px; }
    #themeBtn, #menuBtn { padding: 10px 15px; height: 45px; font-size: 14px; }
    #menuBtn { width: 45px; padding: 0; position: fixed; right: 20px; left: auto; }
    header { display: flex; flex-direction: column-reverse; gap: 15px; margin-top: 20px; }
    .main-title { font-size: 1.5rem; }
    .logo { align-self: center; }
    .page-hero { margin-top: 80px; }
    .form-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>

<div class="controls">
    <button id="themeBtn" onclick="toggleTheme()">🌓 Тема</button>
    <button id="menuBtn" onclick="toggleMenu()">🏠</button>
</div>

<div class="sidebar" id="sidebar">
    <button id="closeBtn" onclick="toggleMenu()">✖</button>
    <div class="sidebar-links">
        <a href="index.html">Головна</a>
        <a href="news.html">Новини</a>
        <a href="past_events.html">Проєкти</a>
        <a href="about.html">Про нас</a>
        <a href="skrynkaidey.html">Скринька ідей</a>
    </div>
    <div id="versionBox">Версія: <span id="version"></span></div>
</div>

<div class="page-hero">
    <img src="Konkyrs.jpg" alt="Конкурс">
</div>

<header>
    <h1 class="main-title">Форма реєстрації на конкурс</h1>
    <div class="logo">
        <img src="Logo1variant.png" alt="Логотип" style="width:120%;height:120%;object-fit:cover;">
    </div>
</header>

<div class="container">

    <div id="login-block" class="login-card">
        <h2>🔐 Увійдіть щоб продовжити</h2>
        <p>Для реєстрації потрібен Gmail-акаунт</p>
        <button class="google-btn" id="google-btn">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Увійти через Google
        </button>
        <p style="font-size:0.8rem;opacity:0.5;margin-top:15px;">Приймаються лише @gmail.com акаунти</p>
    </div>

    <div id="app-block" style="display:none;">
        <div class="user-info" id="user-info">
            <img id="user-photo" src="" alt="">
            <span id="user-name"></span>
            <button class="logout-btn" id="logout-btn">Вийти</button>
        </div>

        <div class="form-card" id="form-card-ui">
            <div id="form-inputs">
                <div class="form-row">
                    <div class="form-field">
                        <label>Ім'я</label>
                        <input type="text" id="f-name" placeholder="Наприклад: Маркіян">
                    </div>
                    <div class="form-field">
                        <label>Прізвище</label>
                        <input type="text" id="f-surname" placeholder="Наприклад: Іванців">
                    </div>
                </div>
                <div class="form-field">
                    <label>Клас</label>
                    <input type="text" id="f-class" placeholder="Наприклад: 11-А">
                </div>
                <button class="action-btn" id="submit-btn" onclick="sendForm()">📨 Надіслати заявку</button>
            </div>
            <div class="success-msg" id="form-success">✅ Дякуємо! Вашу заявку отримано.</div>
        </div>
    </div>
</div>

<footer>
    <div class="social-links">
        <a href="https://www.instagram.com/uchnivskesamovriaduvannia" target="_blank">INSTAGRAM</a>
        <a href="https://www.facebook.com/share/1DtXY2x5Us/" target="_blank">FACEBOOK</a>
        <a href="https://t.me/DNLLepkyi" target="_blank">TELEGRAM</a>
        <a href="https://www.tiktok.com/@lyceumlepkogo" target="_blank">TIKTOK</a>
    </div>
    <p style="opacity:0.6;font-size:0.85rem;font-weight:600;">&copy; 2026 учнівське самоврядування</p>
</footer>

<script>
const body = document.body;
const sidebar = document.getElementById('sidebar');
const themeMeta = document.getElementById('theme-color-meta');

function toggleTheme() {
    body.classList.toggle('dark');
    const dark = body.classList.contains('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    themeMeta.content = dark ? '#4b5982' : '#f1e1cd';
}
function toggleMenu() { sidebar.classList.toggle('open'); }

if (localStorage.getItem('theme') === 'dark') {
    body.classList.add('dark');
    themeMeta.content = '#4b5982';
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { 
    getAuth, 
    signInWithRedirect, 
    getRedirectResult,  
    signOut, 
    GoogleAuthProvider, 
    onAuthStateChanged,
    browserLocalPersistence,
    setPersistence
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCyRjdbRjQonfqNX-hY1XSdM2og2xeyngs",
    authDomain: "golosovanna.firebaseapp.com",
    databaseURL: "https://golosovanna-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "golosovanna",
    storageBucket: "golosovanna.firebasestorage.app",
    messagingSenderId: "869952269827",
    appId: "1:869952269827:web:c15cf5553e2e43a2062836"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

provider.setCustomParameters({
    prompt: 'select_account'
});

setPersistence(auth, browserLocalPersistence)
    .then(() => {})
    .catch(console.error);

getRedirectResult(auth)
    .then((result) => {
        if (result?.user) {
            if (!result.user.email.endsWith('@gmail.com')) {
                signOut(auth).then(() => alert('❌ Тільки @gmail.com'));
            }
        }
    })
    .catch((e) => {
        console.log("Redirect result error:", e);
    });

document.addEventListener('click', (e) => {
    const btn = e.target.closest('#google-btn');
    if (btn) signInWithRedirect(auth, provider);
    if (e.target.id === 'logout-btn') signOut(auth);
});

onAuthStateChanged(auth, (user) => {
    console.log("AUTH STATE:", user);

    const loginBlock = document.getElementById('login-block');
    const appBlock = document.getElementById('app-block');
    const isTelegram = /Telegram/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    if (user && user.email.endsWith('@gmail.com')) {
        loginBlock.style.display = 'none';
        appBlock.style.display = 'block';
        document.getElementById('user-photo').src = user.photoURL || '';
        document.getElementById('user-name').textContent = user.displayName || user.email;

        onValue(ref(db, 'registrations/' + user.uid), (snapshot) => {
            const inputs = document.getElementById('form-inputs');
            const success = document.getElementById('form-success');
            if (snapshot.exists()) {
                inputs.style.display = 'none';
                success.style.display = 'block';
                success.textContent = "✅ Ви вже зареєстровані!";
            } else {
                inputs.style.display = 'block';
                success.style.display = 'none';
            }
        });
    } else {
        appBlock.style.display = 'none';
        loginBlock.style.display = 'block';

        if (isTelegram && isIOS) {
            loginBlock.innerHTML = `
                <div style="text-align: center; padding: 10px;">
                    <div style="font-size: 40px; margin-bottom: 10px;">🌐</div>
                    <h3 style="color: #e11d48; margin: 0 0 10px;">Відкрийте у Safari</h3>
                    <p style="font-size: 0.9rem; opacity: 0.8;">Вхід Google не працює всередині Telegram на iOS.</p>
                    <div style="background: rgba(0,0,0,0.05); padding: 15px; border-radius: 20px; text-align: left; margin: 20px 0; border: 1px dashed var(--text);">
                        <b>Інструкція:</b><br>
                        1. Натисніть <b>•••</b> вгорі праворуч.<br>
                        2. Оберіть <b>"Відкрити в Safari"</b>.
                    </div>
                    <button onclick="location.reload()" class="google-btn" style="width:100%; justify-content: center;">🔄 Оновити сторінку</button>
                </div>`;
        } else {
            loginBlock.innerHTML = `
                <h2>🔐 Увійдіть щоб продовжити</h2>
                <p>Для реєстрації потрібен Gmail-акаунт</p>
                <button class="google-btn" id="google-btn">
                    <svg viewBox="0 0 24 24" style="width:20px; height:20px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Увійти через Google
                </button>`;
        }
    }
});

window.sendForm = async () => {
    const user = auth.currentUser;
    if (!user) return;
    const name = document.getElementById('f-name').value.trim();
    const surname = document.getElementById('f-surname').value.trim();
    const cls = document.getElementById('f-class').value.trim();
    const btn = document.getElementById('submit-btn');

    if (!name || !surname || !cls) return alert('Заповніть всі поля');

    btn.disabled = true;
    btn.textContent = "Надсилання...";
    try {
        await set(ref(db, 'registrations/' + user.uid), {
            name, surname, class: cls, email: user.email, time: Date.now()
        });
    } catch (e) {
        alert("Помилка: " + e.message);
        btn.disabled = false;
        btn.textContent = "📨 Надіслати заявку";
    }
};
</script>
<script>document.getElementById("version").textContent = SITE_VERSION;</script>
</body>
</html>
