<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DNL — Голосування та Ідеї</title>
    <style>
        :root {
            --glass: rgba(30, 30, 35, 0.7);
            --blur: blur(20px);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --accent: #0A84FF;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            overflow: hidden; font-family: -apple-system, sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%; animation: gradientBg 15s ease infinite;
            display: flex; justify-content: center; align-items: center; color: white;
        }

        @keyframes gradientBg { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .main-container {
            background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: var(--border); border-radius: 25px; width: 95%; max-width: 450px;
            min-height: 450px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
        }

        /* Вкладки (Tabs) */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 10px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .tab.active { background: var(--accent); color: white; }

        /* Контент */
        .content-section { display: none; flex-direction: column; flex-grow: 1; }
        .content-section.active { display: flex; }

        /* Стилі форми (Анкета) */
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: var(--border);
            border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px;
            font-family: inherit; box-sizing: border-box;
        }
        textarea { height: 80px; resize: none; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }

        /* Стилі голосування (як були) */
        .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .event-tile { background: rgba(255,255,255,0.05); border: var(--border); border-radius: 15px; padding: 8px; text-align: center; cursor: pointer; font-size: 0.7rem; }
        .event-tile.selected { border-color: var(--accent); background: rgba(10,132,255,0.2); }
        .event-tile img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; margin-bottom: 5px; }
        .live-count { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 3px; font-weight: bold; margin-top: 5px; }

        button.main-btn {
            width: 100%; padding: 15px; background: var(--accent); border: none;
            border-radius: 15px; color: white; font-weight: bold; cursor: pointer; margin-top: auto;
        }
        button.main-btn:disabled { background: #444; opacity: 0.5; }

        #auth-screen { text-align: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Екран авторизації -->
        <div id="auth-screen">
            <h2>🔐 Вхід</h2>
            <p>Увійдіть через Google, щоб отримати доступ</p>
            <button class="main-btn" onclick="login()">Увійти через Google</button>
        </div>

        <!-- Основний екран (після входу) -->
        <div id="main-content" style="display: none; height: 100%; flex-direction: column;">
            <div class="tabs">
                <div class="tab active" onclick="showTab('vote', this)">🗳️ Голосування</div>
                <div class="tab" onclick="showTab('form', this)">📝 Анкета</div>
            </div>

            <!-- СЕКЦІЯ 1: ГОЛОСУВАННЯ -->
            <div id="vote-section" class="content-section active">
                <div class="events-grid">
                    <div class="event-tile" onclick="selectEvent('Кіноніч', this)">
                        <img src="https://via.placeholder.com/100" alt="1">
                        <b>Кіноніч</b>
                        <div class="live-count" id="count-kino">0 👤</div>
                    </div>
                    <div class="event-tile" onclick="selectEvent('Турнір FIFA', this)">
                        <img src="https://via.placeholder.com/100" alt="2">
                        <b>FIFA 24</b>
                        <div class="live-count" id="count-fifa">0 👤</div>
                    </div>
                    <div class="event-tile" onclick="selectEvent('Ярмарок', this)">
                        <img src="https://via.placeholder.com/100" alt="3">
                        <b>Ярмарок</b>
                        <div class="live-count" id="count-yarmarok">0 👤</div>
                    </div>
                </div>
                <button id="vote-btn" class="main-btn" onclick="submitVote()" disabled>Оберіть подію</button>
                <p id="vote-status" style="text-align:center; color:#32d74b; display:none;">Голос прийнято! ✅</p>
            </div>

            <!-- СЕКЦІЯ 2: АНКЕТА -->
            <div id="form-section" class="content-section">
                <input type="text" id="user-name" placeholder="Твоє Ім'я та Клас (напр. Іван, 10-А)">
                <textarea id="user-idea" placeholder="Яку подію чи зміну ти хочеш бачити в ліцеї?"></textarea>
                <button id="form-btn" class="main-btn" onclick="submitForm()">Надіслати ідею</button>
                <p id="form-status" style="text-align:center; color:#32d74b; display:none;">Ідея збережена! Дякуємо 💡</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.app/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyRjdbRjQonfqNX-hY1XSdM2og2xeyngs",
            authDomain: "golosovanna.firebaseapp.com",
            databaseURL: "https://golosovanna-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "golosovanna",
            storageBucket: "golosovanna.firebasestorage.app",
            messagingSenderId: "869952269827",
            appId: "1:869952269827:web:c15cf5553e2e43a2062836"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();
        const provider = new GoogleAuthProvider();

        let selectedCandidate = null;

        // Авторизація
        window.login = () => signInWithPopup(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                checkExistingVote(user.uid);
            }
        });

        // Перемикач вкладок
        window.showTab = (tab, el) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tab + '-section').classList.add('active');
        };

        // Логіка голосування
        window.selectEvent = (name, el) => {
            document.querySelectorAll('.event-tile').forEach(t => t.classList.remove('selected'));
            el.classList.add('selected');
            selectedCandidate = name;
            document.getElementById('vote-btn').disabled = false;
            document.getElementById('vote-btn').innerText = "Голосувати за: " + name;
        };

        window.submitVote = async () => {
            const user = auth.currentUser;
            await set(ref(db, 'votes/' + user.uid), { candidateId: selectedCandidate, timestamp: Date.now() });
            showVotedState();
        };

        // Лічильники в реальному часі
        onValue(ref(db, 'votes'), (snap) => {
            let counts = { 'Кіноніч': 0, 'Турнір FIFA': 0, 'Ярмарок': 0 };
            snap.forEach(child => { counts[child.val().candidateId]++; });
            document.getElementById('count-kino').innerText = counts['Кіноніч'] + ' 👤';
            document.getElementById('count-fifa').innerText = counts['Турнір FIFA'] + ' 👤';
            document.getElementById('count-yarmarok').innerText = counts['Ярмарок'] + ' 👤';
        });

        // --- НОВА ЛОГІКА АНКЕТИ ---
        window.submitForm = async () => {
            const name = document.getElementById('user-name').value;
            const idea = document.getElementById('user-idea').value;
            if (!name || !idea) return alert("Заповни всі поля!");

            document.getElementById('form-btn').disabled = true;
            document.getElementById('form-btn').innerText = "Надсилаємо...";

            try {
                // Використовуємо push(), щоб створювати список відповідей
                await push(ref(db, 'suggestions'), {
                    userName: name,
                    text: idea,
                    email: auth.currentUser.email,
                    timestamp: Date.now()
                });
                document.getElementById('form-section').innerHTML = `<p style="text-align:center; padding: 20px;">💡 Твоя ідея надіслана!<br>Разом ми зробимо ліцей кращим.</p>`;
            } catch (e) {
                alert("Помилка при надсиланні");
                document.getElementById('form-btn').disabled = false;
            }
        };

        async function checkExistingVote(uid) {
            const snap = await get(ref(db, 'votes/' + uid));
            if (snap.exists()) showVotedState();
        }

        function showVotedState() {
            document.getElementById('vote-btn').style.display = 'none';
            document.getElementById('vote-status').style.display = 'block';
            document.querySelectorAll('.event-tile').forEach(t => t.style.opacity = '0.6');
        }
    </script>
</body>
</html>
