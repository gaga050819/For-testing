<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f1e1cd" id="theme-color-meta">
    <title>DNL | Хто зверху</title>
    
    <style>
        :root {  
            --bg: #f1e1cd;  
            --text: #4b5982;  
            --card-bg: rgba(255,255,255,0.3);  
            --card-border: rgba(255,255,255,0.5);  
            --accent: #0A84FF;
            --tr: all 0.4s cubic-bezier(0.25,0.8,0.25,1);  
        }  
        *,*::before,*::after { box-sizing: border-box; }  
        
        body {  
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;  
            background: linear-gradient(180deg, var(--bg), #e5d2b8, var(--bg));  
            color: var(--text); display: flex; flex-direction: column; align-items: center;  
            min-height: 100vh; transition: var(--tr);
        }  
        
        body.dark {  
            --bg: #4b5982; --text: #f1e1cd;  
            --card-bg: rgba(241,225,205,0.1); --card-border: rgba(241,225,205,0.2);  
            background: linear-gradient(180deg,#4b5982,#353f5c,#4b5982) !important;  
        }

        /* Кнопки керування */
        .controls { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        #themeBtn, #menuBtn {
            padding: 12px; border-radius: 50px; border: 1px solid var(--card-border);
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: inherit; cursor: pointer; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: var(--tr);
        }

        /* Бокове меню */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 100%; max-width: 300px; height: 100vh;
            background: var(--card-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid var(--card-border); z-index: 1001; transition: var(--tr);
            display: flex; flex-direction: column; padding: 100px 30px 0; opacity: 0;
        }
        .sidebar.open { left: 0; opacity: 1; }
        .sidebar a {
            text-decoration: none; padding: 18px 25px; margin-bottom: 20px; border-radius: 25px;
            background: rgba(255,255,255,0.1); border: 1px solid var(--card-border);
            color: inherit; font-weight: 700; transition: var(--tr);
        }

        /* Контейнери */
        .container {
            width: 90%; max-width: 450px; margin-top: 100px; text-align: center;
        }

        .hero-image {
            width: 100%; border-radius: 40px; border: 1px solid var(--card-border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 30px;
        }

        .form-card {
            background: var(--card-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border); border-radius: 40px; padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 50px;
        }

        input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 16px 20px; color: var(--text); margin-bottom: 20px;
            font-size: 1rem; outline: none; transition: var(--tr);
        }

        button.main-btn {
            width: 100%; padding: 18px; border: none; border-radius: 22px;
            background: var(--accent); color: white; font-weight: 800;
            font-size: 1.1rem; cursor: pointer; transition: var(--tr);
        }
        button.main-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        button:disabled { background: #666; opacity: 0.6; cursor: not-allowed; }

        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .user-info { font-size: 0.9rem; margin-bottom: 20px; opacity: 0.8; }

        @media (max-width: 768px) {
            #menuBtn { position: fixed; right: 20px; left: auto; top: 15px; width: 50px; height: 50px; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">  
    <a href="index.html">Головна</a>  
    <a href="news.html">Новини</a>  
    <a href="past_events.html">Проєкти</a>  
    <a href="about.html">Про нас</a>  
    <a href="skrynkaidey.html">Скринька ідей</a>  
</div>

<div class="controls">  
    <button id="themeBtn" onclick="toggleTheme()">🌓 Тема</button>  
    <button id="menuBtn" onclick="toggleMenu()">🏠</button>  
</div>

<div class="container">
    <img src="https://via.placeholder.com/450/0A84FF/fff?text=Хто+Зверху" class="hero-image" alt="Banner">
    
    <!-- ЕКРАН ВХОДУ -->
    <div id="login-screen" class="form-card">
        <h1 style="margin: 0;">🔐 Вхід</h1>
        <p>Авторизуйтесь, щоб залишити заявку</p>
        <button class="main-btn" id="google-btn">Увійти через Google</button>
    </div>

    <!-- ФОРМА ЗАЯВКИ -->
    <div id="app-content" class="form-card" style="display: none;">
        <h1 style="margin-bottom: 10px;">Заявка</h1>
        <div id="user-display" class="user-info"></div>
        
        <input type="text" id="user-class" placeholder="Твій клас (наприклад: 10-А)">
        <input type="text" id="user-phone" placeholder="Номер телефону або Instagram">
        
        <button class="main-btn" id="send-btn" onclick="sendToFirebase()">Надіслати заявку</button>
        <p id="status-msg" style="display:none; color:#32d74b; margin-top:15px; font-weight:bold;">Ви вже подали заявку! ✅</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Твої налаштування Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCyRjdbRjQonfqNX-hY1XSdM2og2xeyngs",
        authDomain: "golosovanna.firebaseapp.com",
        databaseURL: "https://golosovanna-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "golosovanna",
        storageBucket: "golosovanna.firebasestorage.app",
        messagingSenderId: "869952269827",
        appId: "1:869952269827:web:c15cf5553e2e43a2062836"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase();
    const provider = new GoogleAuthProvider();

    // Вхід
    document.getElementById('google-btn').onclick = () => {
        signInWithPopup(auth, provider).catch(e => alert("Помилка: " + e.message));
    };

    // Перевірка стану
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-display').innerText = `Привіт, ${user.displayName} (${user.email})`;
            
            // Перевірка чи вже є заявка
            onValue(ref(db, 'applications/' + user.uid), (s) => {
                if (s.exists()) {
                    document.getElementById('user-class').style.display = 'none';
                    document.getElementById('user-phone').style.display = 'none';
                    document.getElementById('send-btn').style.display = 'none';
                    document.getElementById('status-msg').style.display = 'block';
                }
            });
        }
    });

    // Надсилання
    window.sendToFirebase = () => {
        const user = auth.currentUser;
        const uClass = document.getElementById('user-class').value;
        const uPhone = document.getElementById('user-phone').value;

        if (!uClass || !uPhone) return alert("Заповни всі поля!");

        set(ref(db, 'applications/' + user.uid), {
            name: user.displayName,
            email: user.email,
            class: uClass,
            contact: uPhone,
            time: Date.now()
        }).then(() => {
            // Також дублюємо в Telegram для сповіщення
            sendToTelegram(user.displayName, uClass, uPhone);
        });
    };

    async function sendToTelegram(name, uClass, contact) {
        const TG_TOKEN = '8450851710:AAGsC5O72ab-C8ZWw2guCc7bGMX0rRbhhZI';
        const TG_CHAT_ID = '6190541661';
        const text = `🎯 НОВА ЗАЯВКА FIREBASE:\n👤 Учень: ${name}\n🏫 Клас: ${uClass}\n📱 Контакт: ${contact}`;
        
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text })
        });
    }
</script>

<script>
    // Інтерфейсні функції
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-color-meta').content = isDark ? '#4b5982' : '#f1e1cd';
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('theme-color-meta').content = '#4b5982';
    }
</script>

</body>
</html>
