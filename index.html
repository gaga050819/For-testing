<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Хто зверху | Учнівське самоврядування</title>
    <style>
        :root {
            --bg: #f1e1cd;
            --text: #4b5982;
            --card-bg: rgba(255,255,255,0.3);
            --card-border: rgba(255,255,255,0.5);
            --tr: all 0.4s cubic-bezier(0.25,0.8,0.25,1);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg), #e5d2b8, var(--bg));
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        body.dark {
            --bg: #4b5982;
            --text: #f1e1cd;
            --card-bg: rgba(241,225,205,0.1);
            --card-border: rgba(241,225,205,0.2);
        }

        .controls { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 15px; }
        
        #themeBtn, #menuBtn {
            padding: 12px; border-radius: 50px;
            border: 1px solid var(--card-border);
            background: var(--card-bg); backdrop-filter: blur(15px);
            color: inherit; cursor: pointer; font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: var(--tr);
        }

        header { margin: 80px 0 40px; text-align: center; }
        .main-title { font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 900; margin: 0; }

        /* Стиль форми Liquid Glass */
        .form-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .input-group { margin-bottom: 25px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            padding-left: 10px;
            opacity: 0.8;
        }

        input, textarea {
            width: 100%;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 16px 20px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: var(--tr);
        }

        input:focus, textarea:focus {
            background: rgba(255,255,255,0.4);
            border-color: var(--text);
            transform: translateY(-2px);
        }

        textarea { height: 150px; resize: none; }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            border: none;
            background: var(--text);
            color: var(--bg);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--tr);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .submit-btn:hover { transform: scale(1.02); opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: wait; }

        footer { margin-top: auto; padding: 40px; opacity: 0.6; font-size: 0.85rem; font-weight: 600; }

        @media (max-width: 480px) {
            .form-container { padding: 25px; }
            .main-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="controls">  
    <button id="themeBtn" onclick="toggleTheme()">🌓 Тема</button>  
    <button id="menuBtn" onclick="location.href='index.html'">🏠</button>  
</div>

<header>
    <h1 class="main-title">Хто зверху</h1>
</header>

<div class="form-container">
    <div class="input-group">
        <label>Хто ти?</label>
        <input type="text" id="userName" placeholder="Ім'я, Прізвище">
    </div>

    <div class="input-group">
        <label>В якому ви класі?</label>
        <textarea id="userIdea" placeholder="Клас"></textarea>
    </div>

    <button class="submit-btn" id="sendBtn" onclick="sendToTelegram()">📨 Надіслати заявку</button>
</div>

<footer>
    &copy; 2026 учнівське самоврядування
</footer>

<script>
    // Налаштування Telegram (Твої дані)
    const TG_TOKEN = '8450851710:AAGsC5O72ab-C8ZWw2guCc7bGMX0rRbhhZI';
    const TG_CHAT_ID = '6190541661';

    // Темна тема (як на основному сайті)
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }

    // Відправка форми
    async function sendToTelegram() {
        const name = document.getElementById('userName').value.trim();
        const idea = document.getElementById('userIdea').value.trim();
        const btn = document.getElementById('sendBtn');

        if (!name || !idea) {
            alert('Будь ласка, заповни всі поля!');
            return;
        }

        btn.disabled = true;
        btn.innerText = '⏳ Надсилаємо...';

        const message = `💡 НОВА ІДЕЯ:\n👤 Від: ${name}\n📝 Текст: ${idea}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TG_CHAT_ID,
                    text: message
                })
            });

            if (response.ok) {
                alert('✅ Твою ідею отримано! Дякуємо за активність.');
                document.getElementById('userName').value = '';
                document.getElementById('userIdea').value = '';
            } else {
                alert('❌ Помилка при відправці. Спробуй пізніше.');
            }
        } catch (error) {
            alert('❌ Немає з\'єднання з сервером.');
        } finally {
            btn.disabled = false;
            btn.innerText = '📨 Надіслати ідею';
        }
    }
</script>

</body>
</html>
