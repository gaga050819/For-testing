<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNL Platform — Голосування та Ідеї</title>
    <style>
        :root {
            --bg: #0f0c29;
            --accent: #0A84FF;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            width: 90%; max-width: 400px; background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }

        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 8px; font-size: 0.9rem; transition: 0.3s; }
        .tab.active { background: var(--accent); }

        .section { display: none; }
        .section.active { display: block; }

        /* Картки для голосування */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .item { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 8px; text-align: center; cursor: pointer;
        }
        .item.selected { border-color: var(--accent); background: rgba(10, 132, 255, 0.2); }
        .item img { width: 100%; border-radius: 8px; margin-bottom: 5px; }
        .item span { font-size: 0.7rem; display: block; font-weight: bold; }
        .count { font-size: 0.8rem; color: var(--accent); margin-top: 4px; display: block; }

        /* Анкета */
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px; color: white; margin-bottom: 12px; box-sizing: border-box;
        }
        textarea { height: 80px; }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
        }
        button:disabled { background: #444; cursor: not-allowed; }

        #login-screen { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <!-- Екран Входу -->
    <div id="login-screen">
        <h1>🔐 Вхід DNL</h1>
        <p style="opacity: 0.6;">Використовуйте Google-акаунт</p>
        <button id="google-btn">Увійти через Google</button>
    </div>

    <!-- Основний Контент -->
    <div id="app-content" style="display: none;">
        <div class="tabs">
            <div class="tab active" onclick="showSection('vote', this)">Голоси</div>
            <div class="tab" onclick="showSection('form', this)">Ідеї</div>
        </div>

        <!-- Секція Голосування -->
        <div id="vote-sec" class="section active">
            <div class="grid">
                <div class="item" onclick="select('Кіноніч', this)">
                    <img src="https://via.placeholder.com/100/0A84FF/fff?text=Кіно" alt="">
                    <span>Кіноніч</span>
                    <b class="count" id="c1">0</b>
                </div>
                <div class="item" onclick="select('FIFA', this)">
                    <img src="https://via.placeholder.com/100/581c87/fff?text=FIFA" alt="">
                    <span>FIFA</span>
                    <b class="count" id="c2">0</b>
                </div>
                <div class="item" onclick="select('Ярмарок', this)">
                    <img src="https://via.placeholder.com/100/32d74b/fff?text=Food" alt="">
                    <span>Ярмарок</span>
                    <b class="count" id="c3">0</b>
                </div>
            </div>
            <button id="v-btn" onclick="sendVote()" disabled>Оберіть варіант</button>
            <p id="v-status" style="display:none; text-align:center; color:#32d74b;">Голос прийнято! ✅</p>
        </div>

        <!-- Секція Анкети -->
        <div id="form-sec" class="section">
            <input type="text" id="f-name" placeholder="Ім'я та клас">
            <textarea id="f-text" placeholder="Твоя ідея..."></textarea>
            <button id="f-btn" onclick="sendIdea()">Надіслати</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyRjdbRjQonfqNX-hY1XSdM2og2xeyngs",
        authDomain: "golosovanna.firebaseapp.com",
        databaseURL: "https://golosovanna-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "golosovanna",
        storageBucket: "golosovanna.firebasestorage.app",
        messagingSenderId: "869952269827",
        appId: "1:869952269827:web:c15cf5553e2e43a2062836"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getDatabase();
    const provider = new GoogleAuthProvider();

    let choice = null;

    // Кнопка входу
    document.getElementById('google-btn').onclick = () => {
        signInWithPopup(auth, provider).catch(e => alert("Помилка: " + e.message));
    };

    // Перевірка стану входу
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // Перевірка чи вже голосував
            onValue(ref(db, 'votes/' + user.uid), (s) => {
                if (s.exists()) {
                    document.querySelector('.grid').style.opacity = '0.5';
                    document.getElementById('v-btn').style.display = 'none';
                    document.getElementById('v-status').style.display = 'block';
                }
            });
        }
    });

    // Перемикач вкладок
    window.showSection = (name, el) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(name + '-sec').classList.add('active');
    };

    // Вибір варіанту
    window.select = (name, el) => {
        document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        choice = name;
        document.getElementById('v-btn').disabled = false;
        document.getElementById('v-btn').innerText = "Голосувати за " + name;
    };

    // Відправка голосу
    window.sendVote = () => {
        const user = auth.currentUser;
        if (!user || !choice) return;
        set(ref(db, 'votes/' + user.uid), { candidateId: choice, time: Date.now() });
    };

    // Відправка ідеї
    window.sendIdea = () => {
        const name = document.getElementById('f-name').value;
        const text = document.getElementById('f-text').value;
        if (!name || !text) return alert("Заповни поля!");
        
        push(ref(db, 'suggestions'), {
            user: name,
            text: text,
            email: auth.currentUser.email,
            time: Date.now()
        }).then(() => {
            alert("Дякуємо за ідею!");
            document.getElementById('f-name').value = '';
            document.getElementById('f-text').value = '';
        });
    };

    // Живі лічильники
    onValue(ref(db, 'votes'), (snap) => {
        let res = { 'Кіноніч': 0, 'FIFA': 0, 'Ярмарок': 0 };
        snap.forEach(c => { if(res[c.val().candidateId] !== undefined) res[c.val().candidateId]++; });
        document.getElementById('c1').innerText = res['Кіноніч'];
        document.getElementById('c2').innerText = res['FIFA'];
        document.getElementById('c3').innerText = res['Ярмарок'];
    });

</script>
</body>
</html>
